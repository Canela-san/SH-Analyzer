# Software definitions

[grid]
gridFreq=60
measureVoltage=abcn # Connection order to the grid
measureCurrent=abcn # Current 1 as A, 2 as B, 3 as C and 4 as N

[hardware]
# Get the ADC128D818 manufacturer ID
acquisitionDevice=/dev/spi-0
acquisitionFreq=50k
channelSequency=i1,v1,v3,v2,~,i4,i3,i2,~
voltage1Gain=1
voltage2Gain=1
voltage3Gain=1
voltage4Gain=1
voltage1Offset=1
voltage2Offset=1
voltage3Offset=1
voltage4Offset=1
voltageMax=500
current1Gain=1
current2Gain=1
current3Gain=1
current4Gain=1
current1Offset=1
current2Offset=1
current3Offset=1
current4Offset=1
currentMax=30
automaticRange=no
currentSensor=SCT-013 # SCT-006, SCT-010, SCT-013, SCT-016, SCT027H

[software]
deviceName="medidor1"
description="Descrição das medidas as serem amostradas, usar no cabeçalho do arquivo"
lcd=char_2x16 # no, char_2x16, char_4x16, graf_?x? (LCD kind)
lcdInterface=4bits # byte/8bits, 4bits, serial
lcdUpdateTime=2s
lcdMeasures=p,v,i,thd,phasor,pf
comunication=eth0 # no, eth0, can, bluetooth, wifi
comunicationMeasures=signal,p,v,i
storage=bin # no, ascii, bin
fileName=$deviceName-%Y%M%D
fileMeasures=p,v,i,thd,vn_vp
